// ---------------------------- Lógica de simulação ----------------------------
function pois(l){ const L=Math.exp(-l); let k=0,p=1; do{k++;p*=Math.random();}while(p>L); return k-1; }
function simScore(a,b){
  const sa=TEAM[a].s, sb=TEAM[b].s, ratio=sa/sb;
  const la=Math.min(4.2,Math.max(0.2,1.35*Math.pow(ratio,0.95)));
  const lb=Math.min(4.2,Math.max(0.2,1.35*Math.pow(1/ratio,0.95)));
  return { hg:pois(la), ag:pois(lb) };
}
function simKnockout(a,b){
  const r=simScore(a,b);
  if(r.hg===r.ag){ // pênaltis
    const homeWins=Math.random() < TEAM[a].s/(TEAM[a].s+TEAM[b].s);
    const win=4+Math.floor(Math.random()*2), lose=Math.max(2,win-1-Math.floor(Math.random()*2));
    return homeWins ? {...r,hpen:win,apen:lose} : {...r,hpen:lose,apen:win};
  }
  return r;
}

// --------------------- Motor de classificação (critérios FIFA) ---------------
function accumulate(codes, matches){
  const t={}; codes.forEach(c=>t[c]={code:c,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0});
  for(const m of matches){
    if(m.hg==null||m.ag==null) continue;
    const h=t[m.home], a=t[m.away]; if(!h||!a) continue;
    h.P++;a.P++; h.GF+=m.hg;h.GA+=m.ag;a.GF+=m.ag;a.GA+=m.hg;
    if(m.hg>m.ag){h.W++;a.L++;h.Pts+=3;}
    else if(m.hg<m.ag){a.W++;h.L++;a.Pts+=3;}
    else{h.D++;a.D++;h.Pts++;a.Pts++;}
  }
  Object.values(t).forEach(r=>r.GD=r.GF-r.GA);
  return t;
}
const cmp=(a,b)=> b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF;
function resolveBucket(bucket,matches,parent){
  if(bucket.length===1) return bucket;
  if(bucket.length<parent) return breakTie(bucket,matches);
  return [...bucket].sort((x,y)=>x.localeCompare(y)); // fair play/sorteio simulado (determinístico)
}
function breakTie(ids,matches){
  if(ids.length<2) return ids;
  const set=new Set(ids);
  const h2h=matches.filter(m=>set.has(m.home)&&set.has(m.away)&&m.hg!=null);
  const tab=accumulate(ids,h2h);
  const sorted=[...ids].sort((x,y)=>cmp(tab[x],tab[y]));
  const same=(x,y)=>cmp(tab[x],tab[y])===0, res=[]; let bucket=[];
  for(const id of sorted){
    if(!bucket.length||same(bucket[bucket.length-1],id)) bucket.push(id);
    else { res.push(...resolveBucket(bucket,matches,ids.length)); bucket=[id]; }
  }
  if(bucket.length) res.push(...resolveBucket(bucket,matches,ids.length));
  return res;
}
function standings(codes, matches){
  const tab=accumulate(codes,matches);
  const byOverall=[...codes].sort((x,y)=>cmp(tab[x],tab[y]));
  const same=(x,y)=>cmp(tab[x],tab[y])===0, order=[]; let bucket=[];
  for(const c of byOverall){
    if(!bucket.length||same(bucket[bucket.length-1],c)) bucket.push(c);
    else { order.push(...breakTie(bucket,matches)); bucket=[c]; }
  }
  if(bucket.length) order.push(...breakTie(bucket,matches));
  return order.map((c,i)=>({...tab[c], rank:i+1}));
}

  G:["A","E","H","I","J"], I:["C","D","F","G","H"], K:["D","E","I","J","L"], L:["E","H","I","J","K"],
};
const T3_SLOTS = ["A","B","D","E","G","I","K","L"];
// Fluxo do mata-mata: jogo -> [refA, refB]. W=vencedor, L=perdedor do jogo citado.
const KO_FLOW = {
  89:["W74","W77"],90:["W73","W75"],91:["W76","W78"],92:["W79","W80"],
  93:["W83","W84"],94:["W81","W82"],95:["W86","W88"],96:["W85","W87"],
  97:["W89","W90"],98:["W93","W94"],99:["W91","W92"],100:["W95","W96"],
  101:["W97","W98"],102:["W99","W100"],103:["L101","L102"],104:["W101","W102"],
};
// Aloca os 8 terceiros classificados aos 8 slots, respeitando os grupos permitidos.
// (Existe matching válido para qualquer combinação de 8 entre os 12 grupos — Anexo C.)
function assignThirds(qGroups){
  const qset=new Set(qGroups), used=new Set(), assign={};
  const bt=(i)=>{
    if(i===T3_SLOTS.length) return true;
    const s=T3_SLOTS[i];
    for(const g of T3_ALLOWED[s]){
      if(qset.has(g) && !used.has(g)){ assign[s]=g; used.add(g); if(bt(i+1)) return true; used.delete(g); delete assign[s]; }
    }
    return false;
  };
  bt(0);
  return assign; // grupo-do-vencedor -> grupo-do-3º
}
function winner(m){ if(!m||m.home==null||m.away==null||m.hg==null||m.ag==null) return null;
  if(m.hg>m.ag) return m.home; if(m.ag>m.hg) return m.away;
  if(m.hpen!=null&&m.apen!=null){ if(m.hpen>m.apen) return m.home; if(m.apen>m.hpen) return m.away; } return null; }
function loser(m){ const w=winner(m); if(!w) return null; return w===m.home?m.away:m.home; }

// Confrontos dos 32-avos com os times reais.
function buildR32(groupRows, bestThirds){
  const W={},R={},T={};
  for(const g of GROUP_CODES){ W[g]=groupRows[g][0].code; R[g]=groupRows[g][1].code; T[g]=groupRows[g][2].code; }
  const tA=assignThirds(bestThirds.filter(x=>x.ok).map(x=>x.group));
  const pick=(s)=> s.w? W[s.w] : s.r? R[s.r] : T[tA[s.t]];
  return R32_DEF.map(m=>({n:m.n, home:pick(m.a), away:pick(m.b)}));
}
// Mata-mata completo a partir dos 32-avos + resultados (koRes indexado pelo nº do jogo).
function buildBracketOfficial(r32, res){
  if(!r32) return null;
  const M={};
  const mk=(n,home,away)=>{ const r=res[n]||{}; M[n]={id:n,n,home,away,hg:r.hg??null,ag:r.ag??null,hpen:r.hpen??null,apen:r.apen??null}; };
  r32.forEach(m=>mk(m.n,m.home,m.away));
  for(const n of [89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104]){
    const [ra,rb]=KO_FLOW[n];
    const team=(ref)=>{ const src=M[+ref.slice(1)]; if(!src) return null; return ref[0]==="W"?winner(src):loser(src); };
    mk(n, team(ra), team(rb));
  }
  return { M, champion: winner(M[104]) };
}
function simulateOfficial(r32){
  const res={};
  r32.forEach(m=>{ if(m.home&&m.away) res[m.n]=simKnockout(m.home,m.away); });
  for(const n of [89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104]){
    const m=buildBracketOfficial(r32,res).M[n];
    if(m.home&&m.away) res[n]=simKnockout(m.home,m.away);
  }
  return res;
}
const ORD_R32=[74,77,73,75, 83,84,81,82, 76,78,79,80, 86,88,85,87];
const ORD_R16=[89,90,93,94, 91,92,95,96];
const ORD_QF=[97,98,99,100];
const ORD_SF=[101,102];
// rótulo oficial de cada slot (p/ conferência contra a chave oficial)
const slotLabel=(s)=> s.w?("Venc. "+s.w) : s.r?("Vice "+s.r) : ("3º "+T3_ALLOWED[s.t].join("/"));
const R32_LABEL={}; R32_DEF.forEach(m=>{ R32_LABEL[m.n]=slotLabel(m.a)+" × "+slotLabel(m.b); });

// ===================== MONTE CARLO (previsão, por índices, rápido) =====================
const MC_CODES = Object.keys(TEAM);
const MC_IDX = {}; MC_CODES.forEach((c,i)=>MC_IDX[c]=i);
const MC_S   = MC_CODES.map(c=>TEAM[c].s);
const MC_GRP = MC_CODES.map(c=>TEAM[c].g);
const MC_GROUPS = {}; MC_CODES.forEach((c,i)=>{ (MC_GROUPS[TEAM[c].g] = MC_GROUPS[TEAM[c].g]||[]).push(i); });
const FIXI = [[0,1],[2,3],[0,2],[3,1],[0,3],[1,2]];

function mcGoals(si,sj){
  const r=si/sj;
  const la=Math.min(4.2,Math.max(0.18,1.35*Math.pow(r,0.95)));
  const lb=Math.min(4.2,Math.max(0.18,1.35*Math.pow(1/r,0.95)));
  return [pois(la),pois(lb)];
}
function mcKoWin(a,b){ const [ga,gb]=mcGoals(MC_S[a],MC_S[b]);
  if(ga>gb) return a; if(gb>ga) return b; return (Math.random()<MC_S[a]/(MC_S[a]+MC_S[b]))?a:b; }

// classificação de um grupo (members = 4 índices) com desempate FIFA (geral + confronto direto)
function mcGroup(members){
  const Pts=[0,0,0,0], GF=[0,0,0,0], GA=[0,0,0,0], res=[];
  for(const [x,y] of FIXI){
    const [ga,gb]=mcGoals(MC_S[members[x]],MC_S[members[y]]);
    res.push([x,y,ga,gb]);
    GF[x]+=ga;GA[x]+=gb;GF[y]+=gb;GA[y]+=ga;
    if(ga>gb)Pts[x]+=3; else if(gb>ga)Pts[y]+=3; else {Pts[x]++;Pts[y]++;}
  }
  const GD=[0,1,2,3].map(i=>GF[i]-GA[i]);
  const ord=[0,1,2,3].sort((p,q)=> Pts[q]-Pts[p] || GD[q]-GD[p] || GF[q]-GF[p] || (Math.random()-.5));
  // confronto direto entre blocos empatados em Pts/GD/GF
  for(let i=0;i<ord.length-1;i++){
    let j=i+1; while(j<ord.length && Pts[ord[j]]===Pts[ord[i]] && GD[ord[j]]===GD[ord[i]] && GF[ord[j]]===GF[ord[i]]) j++;
    if(j-i>1){
      const tied=ord.slice(i,j);
      const mP={}, mGD={}, mGF={}; tied.forEach(t=>{mP[t]=0;mGD[t]=0;mGF[t]=0;});
      for(const [x,y,ga,gb] of res){
        if(mP[x]!==undefined && mP[y]!==undefined){
          mGF[x]+=ga;mGF[y]+=gb;mGD[x]+=ga-gb;mGD[y]+=gb-ga;
          if(ga>gb)mP[x]+=3; else if(gb>ga)mP[y]+=3; else {mP[x]++;mP[y]++;}
        }
      }
      const re=tied.sort((p,q)=> mP[q]-mP[p] || mGD[q]-mGD[p] || mGF[q]-mGF[p] || (Math.random()-.5));
      for(let k=i;k<j;k++) ord[k]=re[k-i];
    }
  }
  return ord.map(i=>({m:members[i], Pts:Pts[i], GD:GD[i], GF:GF[i]}));
}

// roda `n` torneios (estrutura oficial) e acumula contagens em acc (Float64Array de 48)
function mcRunBatch(n, acc){
  for(let s=0;s<n;s++){
    const W={},R={},T={}, thirds=[];
    for(const g of GROUP_CODES){
      const t=mcGroup(MC_GROUPS[g]);
      W[g]=t[0].m; R[g]=t[1].m; T[g]=t[2].m;
      thirds.push({Pts:t[2].Pts,GD:t[2].GD,GF:t[2].GF,group:g});
    }
    thirds.sort((p,q)=> q.Pts-p.Pts || q.GD-p.GD || q.GF-p.GF || (Math.random()-.5));
    const tA=assignThirds(thirds.slice(0,8).map(x=>x.group));
    const pick=(sl)=> sl.w? W[sl.w] : sl.r? R[sl.r] : T[tA[sl.t]];
    const win={};
    for(const m of R32_DEF) win[m.n]=mcKoWin(pick(m.a),pick(m.b));     // 32-avos -> oitavas
    const w=(ref)=> win[+ref.slice(1)];
    for(const nn of [89,90,91,92,93,94,95,96]){ const [a,b]=KO_FLOW[nn]; win[nn]=mcKoWin(w(a),w(b)); acc.quarter[win[nn]]++; }
    for(const nn of [97,98,99,100]){ const [a,b]=KO_FLOW[nn]; win[nn]=mcKoWin(w(a),w(b)); acc.semi[win[nn]]++; }
    for(const nn of [101,102]){ const [a,b]=KO_FLOW[nn]; win[nn]=mcKoWin(w(a),w(b)); acc.final[win[nn]]++; }
    const [fa,fb]=KO_FLOW[104]; acc.title[mcKoWin(w(fa),w(fb))]++;
  }
}

              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:1,background:T.line}}>

// ------------------------------ Sub-componentes ------------------------------
function btn(bg,color,border){ return {display:"inline-flex",alignItems:"center",gap:6,background:bg,color,
  border:border?`1px solid ${border}`:"none",borderRadius:7,padding:"8px 12px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}; }

// Bandeira real (renderiza em qualquer SO). Se a imagem falhar, mostra o código.
function Flag({code,h=14}){
  const iso=ISO[code];
  return (
    <span style={{display:"inline-flex",alignItems:"center",verticalAlign:"middle",lineHeight:0}}>
      <img alt={code} height={h} src={`https://flagcdn.com/h${h<=20?40:80}/${iso}.png`}
        style={{height:h,width:Math.round(h*1.5),objectFit:"cover",borderRadius:2,boxShadow:"0 0 0 1px rgba(0,0,0,.15)"}}
        onError={(e)=>{ e.currentTarget.style.display="none"; const s=e.currentTarget.nextSibling; if(s) s.style.display="inline-block"; }}/>
      <span style={{display:"none",fontSize:Math.round(h*0.72),fontWeight:800,opacity:.8}}>{code}</span>
    </span>
  );
}

        <button onClick={()=>simGroup(g)} title="Simular grupo"

          <Shuffle size={12}/> sim
        </button>
      </div>
      {/* tabela */}
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead>
          <tr style={{color:sub,fontSize:10}}>
            <th style={{textAlign:"left",padding:"6px 4px 6px 12px"}}>#</th>
            <th style={{textAlign:"left",padding:"6px 4px"}}>SELEÇÃO</th>

              <td style={{padding:"6px 4px",textAlign:"center"}}>{r.W}</td>
              <td style={{padding:"6px 4px",textAlign:"center"}}>{r.D}</td>
              <td style={{padding:"6px 4px",textAlign:"center"}}>{r.L}</td>
              <td style={{padding:"6px 4px",textAlign:"center",color: r.GD>0?"#2DB9A0":r.GD<0?"#E4572E":sub}}>{r.GD>0?"+":""}{r.GD}</td>

            </tr>
          ))}

      {/* jogos */}

        {matches.map(m=>(

            </div>}
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}>

function Bracket({b,T,sub,setKo,onSim,dark}){
  const M=b.M, champ=b.champion;
  // metades da chave (estrutura oficial): cada lado vai de 8 32-avos até 1 semifinalista
  const L={ R32:[74,77,73,75,83,84,81,82], R16:[89,90,93,94], QF:[97,98], SF:[101] };
  const Rr={ SF:[102], QF:[99,100], R16:[91,92,95,96], R32:[76,78,79,80,86,88,85,87] };
  const cap=(n)=> n===101?SF_INFO[0] : n===102?SF_INFO[1] : (Rr.R32.includes(n)||L.R32.includes(n))?R32_LABEL[n] : null;
  const Col=({nums,ph})=>(
    <div style={{display:"flex",flexDirection:"column",justifyContent:"space-around",alignItems:"stretch",
      minWidth: ph==="R32"?132:122}}>
      {nums.map(n=> <KOCompact key={n} m={M[n]} n={n} color={PHASE[ph].color} T={T} sub={sub} setKo={setKo} dark={dark} caption={cap(n)}/> )}
    </div>
  );
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:sub}}>Chaveamento oficial FIFA · edite os placares (no empate, digite os pênaltis).</span>
        <button onClick={onSim} style={btn("#ED7D3A","#0c0c0c")}><Zap size={14}/> Simular mata-mata</button>
      </div>
      <div style={{display:"flex",alignItems:"stretch",gap:8,overflowX:"auto",paddingBottom:12,minHeight:700}}>
        <Col nums={L.R32} ph="R32"/>
        <Col nums={L.R16} ph="R16"/>
        <Col nums={L.QF}  ph="QF"/>
        <Col nums={L.SF}  ph="SF"/>
        {/* centro: final + campeã + 3º lugar */}
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",minWidth:170,gap:8,padding:"0 4px"}}>
          <div className="anton" style={{fontSize:14,color:PHASE.F.color}}>FINAL</div>
          <div style={{fontSize:9,color:sub,textAlign:"center"}}>{PHASEDATE.F}</div>
          <div style={{width:150}}><KOCompact m={M[104]} n={104} color={PHASE.F.color} T={T} sub={sub} setKo={setKo} dark={dark}/></div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,margin:"8px 0"}}>
            <Trophy size={32} color="#F2B705"/>
            <div style={{fontSize:9,color:sub,letterSpacing:".14em"}}>CAMPEÃ</div>
            {champ
              ? <div className="anton" style={{fontSize:16,display:"flex",alignItems:"center",gap:7,textAlign:"center"}}><Flag code={champ} h={20}/> {TEAM[champ].n.toUpperCase()}</div>
              : <div style={{color:sub,fontSize:12}}>—</div>}
          </div>
          <div className="anton" style={{fontSize:11,color:PHASE.TP.color,marginTop:6}}>3º LUGAR</div>
          <div style={{fontSize:9,color:sub}}>{PHASEDATE.TP}</div>
          <div style={{width:150}}><KOCompact m={M[103]} n={103} color={PHASE.TP.color} T={T} sub={sub} setKo={setKo} dark={dark}/></div>
        </div>
        <Col nums={Rr.SF}  ph="SF"/>
        <Col nums={Rr.QF}  ph="QF"/>
        <Col nums={Rr.R16} ph="R16"/>
        <Col nums={Rr.R32} ph="R32"/>
      </div>
      {/* legenda de fases + datas */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"4px 14px",fontSize:10,color:sub,marginTop:4}}>
        {[["R32","32-avos"],["R16","oitavas"],["QF","quartas"],["SF","semis"],["F","final"]].map(([k,l])=>(
          <span key={k} style={{display:"inline-flex",alignItems:"center",gap:4}}>
            <i style={{width:9,height:9,borderRadius:2,background:PHASE[k].color,display:"inline-block"}}/>{l}: {PHASEDATE[k]}
          </span>
        ))}
      </div>
    </div>
  );
}

// confronto compacto do mata-mata (códigos de 3 letras + placar; pênaltis no empate)
function KOCompact({m,n,color,T,sub,setKo,dark,caption}){
  if(!m) return null;
  const w=winner(m);
  const isDraw=m.hg!=null && m.ag!=null && m.hg===m.ag;
  const Row=({code,goals,penField,penVal})=>{
    const won=w&&w===code;
    return (
      <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 5px",
        background: won?(dark?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)"):"transparent"}}>
        <span style={{width:18,display:"inline-flex"}}>{code?<Flag code={code} h={12}/>:null}</span>
        <span style={{flex:1,fontSize:11,fontWeight:won?800:500,color:code?T.text:sub,whiteSpace:"nowrap"}}>{code?code:"—"}</span>
        {isDraw&&code&&<input className="score" type="number" inputMode="numeric" value={penVal==null?"":penVal}
          onChange={e=>setKo(m.id,penField, e.target.value===""?null:Math.max(0,Math.min(99,parseInt(e.target.value,10)||0)))}
          title="pênaltis"
          style={{width:18,textAlign:"center",background:"transparent",color:color,border:"none",borderBottom:`1px dashed ${color}`,fontSize:10,fontWeight:700}}/>}
        <input className="score" type="number" inputMode="numeric" value={goals==null?"":goals}
          onChange={e=>setKo(m.id, penField==="hpen"?"hg":"ag", e.target.value===""?null:Math.max(0,Math.min(99,parseInt(e.target.value,10)||0)))}
          style={{width:24,textAlign:"center",background:T.inputBg,color:T.text,border:`1px solid ${won?color:T.line}`,borderRadius:4,padding:"2px 0",fontSize:12,fontWeight:700}}/>
      </div>
    );
  };
  return (
    <div title={caption?`Jogo ${n} · ${caption}`:`Jogo ${n}`}>
      {caption && /\d{2}\/\d{2}/.test(caption) && <div style={{fontSize:8.5,color:sub,textAlign:"center"}}>{caption}</div>}
      <div style={{background:T.panel,border:`1px solid ${T.line}`,borderLeft:`3px solid ${color}`,borderRadius:6,overflow:"hidden"}}>
        <Row code={m.home} goals={m.hg} penField="hpen" penVal={m.hpen}/>
        <div style={{height:1,background:T.line}}/>
        <Row code={m.away} goals={m.ag} penField="apen" penVal={m.apen}/>
      </div>
      <div style={{fontSize:8,color:sub,textAlign:"center",opacity:.7}}>J{n}</div>
    </div>
  );
}

function MonteCarlo({T,sub,dark}){
  const [running,setRunning]=useState(false);
  const [progress,setProgress]=useState(0);
  const [N,setN]=useState(20000);
  const [data,setData]=useState(null); // {n, rows}

  const run=(total)=>{
    setRunning(true); setProgress(0); setData(null);
    const acc={ title:new Float64Array(48), final:new Float64Array(48), semi:new Float64Array(48), quarter:new Float64Array(48), n:0 };
    const batch=2000;
    const step=()=>{
      const k=Math.min(batch,total-acc.n);
      mcRunBatch(k,acc); acc.n+=k;
      setProgress(Math.round(100*acc.n/total));
      if(acc.n<total) setTimeout(step,0);
      else {
        const rows=MC_CODES.map((c,i)=>({code:c, nota:NOTA[c],
          title:100*acc.title[i]/total, final:100*acc.final[i]/total,
          semi:100*acc.semi[i]/total, quarter:100*acc.quarter[i]/total}))
          .sort((a,b)=> b.title-a.title || b.nota-a.nota);
        setData({n:total, rows}); setRunning(false);
      }
    };
    setTimeout(step,0);
  };

  const maxTitle = data ? Math.max(...data.rows.slice(0,12).map(r=>r.title),1) : 1;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:14}}>
        <span style={{fontSize:12,color:sub,flex:1,minWidth:200}}>
          Roda o torneio inteiro N vezes (grupos com desempate FIFA → 8 melhores 3ºs → mata-mata) e mede a frequência de cada fase.
          A força de cada seleção é a nota do modelo de 7 critérios.
        </span>
        {[10000,20000,50000].map(v=>(
          <button key={v} onClick={()=>setN(v)} disabled={running}
            style={{...btn(N===v?"#2DB9A0":T.panel2, N===v?"#06231f":T.text, T.line), opacity:running?.5:1}}>
            {v.toLocaleString("pt-BR")}
          </button>
        ))}
        <button onClick={()=>run(N)} disabled={running} style={{...btn("#ED7D3A","#0c0c0c"), opacity:running?.6:1}}>
          <Zap size={14}/> {running? `Simulando… ${progress}%` : "Rodar Monte Carlo"}
        </button>
      </div>

      {running && (
        <div style={{height:6,background:T.panel2,borderRadius:6,overflow:"hidden",marginBottom:16}}>
          <div style={{height:"100%",width:`${progress}%`,background:"#ED7D3A",transition:"width .1s"}}/>
        </div>
      )}

      {!data && !running && (
        <div style={{textAlign:"center",padding:"50px 20px",color:sub}}>
          <Trophy size={36} style={{opacity:.4}}/>
          <p style={{fontSize:13,marginTop:10}}>Escolha o nº de simulações e clique em <b>Rodar Monte Carlo</b>.</p>
        </div>
      )}

      {data && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14,alignItems:"start"}}>
          {/* gráfico de barras: probabilidade de título (top 12) */}
          <div style={{background:T.panel,border:`1px solid ${T.line}`,borderRadius:10,padding:14}}>
            <div className="anton" style={{fontSize:14,marginBottom:4}}>PROBABILIDADE DE TÍTULO</div>
            <div style={{fontSize:11,color:sub,marginBottom:12}}>{data.n.toLocaleString("pt-BR")} simulações · top 12</div>
            {data.rows.slice(0,12).map((r,i)=>(
              <div key={r.code} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                <span style={{width:118,fontSize:12,display:"inline-flex",alignItems:"center",gap:6,whiteSpace:"nowrap",overflow:"hidden"}}>
                  <Flag code={r.code}/> {TEAM[r.code].n}
                </span>
                <div style={{flex:1,height:14,background:dark?"#0f1115":"#eef0f4",borderRadius:7,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${100*r.title/maxTitle}%`,borderRadius:7,
                    background: i<4?"#ED7D3A":i<8?"#F2B705":"#8B93A1"}}/>
                </div>
                <span style={{width:40,textAlign:"right",fontSize:12,fontWeight:700}}>{r.title.toFixed(1)}%</span>
              </div>
            ))}
          </div>

          {/* tabela completa de probabilidades */}
          <div style={{background:T.panel,border:`1px solid ${T.line}`,borderRadius:10,overflow:"hidden"}}>
            <div className="anton" style={{padding:"10px 14px",fontSize:14,background:T.panel2,borderBottom:`1px solid ${T.line}`}}>
              RANKING & PROBABILIDADES
            </div>
            <div style={{maxHeight:520,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{color:sub,fontSize:10,position:"sticky",top:0,background:T.panel2}}>
                  <th style={{padding:"7px 6px 7px 12px",textAlign:"left"}}>#</th>
                  <th style={{padding:"7px 6px",textAlign:"left"}}>SELEÇÃO</th>
                  <th style={{padding:"7px 6px",textAlign:"center"}}>NOTA</th>
                  <th style={{padding:"7px 6px",textAlign:"center"}}>TÍT</th>
                  <th style={{padding:"7px 6px",textAlign:"center"}}>FIN</th>
                  <th style={{padding:"7px 6px",textAlign:"center"}}>SEMI</th>
                  <th style={{padding:"7px 8px 7px 6px",textAlign:"center"}}>QUART</th>
                </tr></thead>
                <tbody>
                  {data.rows.map((r,i)=>(
                    <tr key={r.code} style={{borderTop:`1px solid ${T.line}`,
                      background: i<8?(dark?"rgba(237,125,58,.07)":"rgba(237,125,58,.06)"):"transparent"}}>
                      <td style={{padding:"6px 6px 6px 12px",color:sub}}>{i+1}</td>
                      <td style={{padding:"6px 6px"}}><span style={{display:"inline-flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}><Flag code={r.code}/> {TEAM[r.code].n}</span></td>
                      <td style={{padding:"6px 6px",textAlign:"center",color:sub}}>{r.nota.toFixed(1)}</td>
                      <td style={{padding:"6px 6px",textAlign:"center",fontWeight:800}}>{r.title.toFixed(1)}</td>
                      <td style={{padding:"6px 6px",textAlign:"center"}}>{r.final.toFixed(1)}</td>
                      <td style={{padding:"6px 6px",textAlign:"center"}}>{r.semi.toFixed(1)}</td>
                      <td style={{padding:"6px 8px 6px 6px",textAlign:"center"}}>{r.quarter.toFixed(1)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Stats({matches,bracket,T,sub,dark}){
  const agg=useMemo(()=>{
    const t={}; const add=(c)=>{ if(!t[c]) t[c]={code:c,GF:0,GA:0,W:0,P:0}; };
    const all=[...matches];
    if(bracket && bracket.M){ for(const n in bracket.M) all.push(bracket.M[n]); }
    for(const m of all){ if(!m||m.home==null||m.away==null||m.hg==null||m.ag==null) continue;
      add(m.home);add(m.away);
      t[m.home].GF+=m.hg;t[m.home].GA+=m.ag;t[m.home].P++;
      t[m.away].GF+=m.ag;t[m.away].GA+=m.hg;t[m.away].P++;
      const w = m.hg>m.ag?m.home : m.ag>m.hg?m.away : (m.hpen>m.apen?m.home : m.apen>m.hpen?m.away:null);
      if(w) t[w].W++;
    }
    return Object.values(t);
  },[matches,bracket]);

  const played = agg.some(a=>a.P>0);
  if(!played) return <div style={{color:sub,textAlign:"center",padding:40}}>Simule alguns jogos para ver as estatísticas.</div>;

  const topScore=[...agg].sort((a,b)=>b.GF-a.GF).slice(0,8);
  const topDef=[...agg].filter(a=>a.P>=2).sort((a,b)=> (a.GA/a.P)-(b.GA/b.P)).slice(0,8);
  const topWins=[...agg].sort((a,b)=>b.W-a.W).slice(0,8);
  const maxGF=Math.max(...topScore.map(a=>a.GF),1);

  const Bars=({title,color,data,fmt})=>(
    <div style={{background:T.panel,border:`1px solid ${T.line}`,borderRadius:10,padding:14}}>
      <div className="anton" style={{fontSize:14,marginBottom:10}}>{title}</div>
      {data.map(a=>(
        <div key={a.code} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
          <span style={{width:128,fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"inline-flex",alignItems:"center",gap:6}}><Flag code={a.code}/> {TEAM[a.code].n}</span>
          <div style={{flex:1,height:14,background:dark?"#0f1115":"#eef0f4",borderRadius:7,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${fmt.w(a)}%`,background:color,borderRadius:7}}/>
          </div>
          <span style={{width:34,textAlign:"right",fontSize:12,fontWeight:700}}>{fmt.v(a)}</span>
        </div>
      ))}
    </div>
  );

  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
      <Bars title="ARTILHARIA POR SELEÇÃO" color="#ED7D3A" data={topScore}
        fmt={{w:a=>100*a.GF/maxGF, v:a=>a.GF}}/>
      <Bars title="MAIS VITÓRIAS" color="#2DB9A0" data={topWins}
        fmt={{w:a=>100*a.W/Math.max(...topWins.map(x=>x.W),1), v:a=>a.W}}/>
      <Bars title="MELHOR DEFESA (gols sofridos/jogo)" color="#4361EE" data={topDef}
        fmt={{w:a=>100*(1-(a.GA/a.P)/Math.max(...topDef.map(x=>x.GA/x.P),1)), v:a=>(a.GA/a.P).toFixed(1)}}/>
      <div style={{background:T.panel,border:`1px solid ${T.line}`,borderRadius:10,padding:14}}>
        <div className="anton" style={{fontSize:14,marginBottom:10}}>RESUMO</div>
        {[["Jogos simulados", agg.reduce((s,a)=>s+a.P,0)/2],
          ["Gols marcados", agg.reduce((s,a)=>s+a.GF,0)],
          ["Média de gols/jogo", (agg.reduce((s,a)=>s+a.GF,0)/Math.max(1,agg.reduce((s,a)=>s+a.P,0)/2)).toFixed(2)],
          ["Seleções em campo", agg.filter(a=>a.P>0).length]
        ].map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${T.line}`,fontSize:13}}>
            <span style={{color:sub}}>{k}</span><span style={{fontWeight:800}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
